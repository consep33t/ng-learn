steps:
  # ─────────────────────────────────────────────
  # STEP 0: Ambil info commit author dari git log
  # ─────────────────────────────────────────────
  - name: "alpine/git"
    id: "get-commit-info"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        git log -1 --pretty=format:"%an" > /workspace/author.txt
        git log -1 --pretty=format:"%s" > /workspace/message.txt
        echo "Author: $(cat /workspace/author.txt)"
        echo "Message: $(cat /workspace/message.txt)"

  # ─────────────────────────────────────────────
  # NOTIFIKASI: Build Dimulai
  # Flag -sS: tampilkan error tapi JANGAN gagalkan build
  # ─────────────────────────────────────────────
  - name: "curlimages/curl"
    id: "notify-start"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        AUTHOR=$$(cat /workspace/author.txt | tr -d '"\\' | tr '\n' ' ')
        COMMIT_MSG=$$(cat /workspace/message.txt | tr -d '"\\' | tr '\n' ' ')
        COMMIT_SHORT=$$(echo "$COMMIT_SHA" | cut -c1-7)
        curl -sS -X POST "${_DISCORD_WEBHOOK}" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"NG.LEARN CI/CD\",\"embeds\":[{\"title\":\"\ud83d\udd04 Build Dimulai\",\"description\":\"Proses build & deploy **NG.LEARN** sedang berjalan...\",\"color\":16776960,\"fields\":[{\"name\":\"\ud83d\udc64 Di-push oleh\",\"value\":\"$$AUTHOR\",\"inline\":true},{\"name\":\"\ud83c\udf3f Branch\",\"value\":\"$BRANCH_NAME\",\"inline\":true},{\"name\":\"\ud83d\udce6 Commit\",\"value\":\"$$COMMIT_SHORT\",\"inline\":true},{\"name\":\"\ud83d\udcdd Pesan Commit\",\"value\":\"$$COMMIT_MSG\",\"inline\":false},{\"name\":\"\ud83d\udccb Log\",\"value\":\"https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID\",\"inline\":false}],\"footer\":{\"text\":\"Google Cloud Build\"}}]}"
        exit 0

  # ─────────────────────────────────────────────
  # STEP 1: Install Dependencies
  # ─────────────────────────────────────────────
  - name: "node:20"
    id: "install"
    entrypoint: "npm"
    args: ["ci"]

  # ─────────────────────────────────────────────
  # STEP 2: Build Next.js
  # ─────────────────────────────────────────────
  - name: "node:20"
    id: "build"
    entrypoint: "npm"
    args: ["run", "build"]
    env:
      - "NODE_ENV=production"

  # ─────────────────────────────────────────────
  # STEP 3: Build Docker Image
  # ─────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-build"
    args:
      - "build"
      - "-t"
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ng-learn:$COMMIT_SHA"
      - "-t"
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ng-learn:latest"
      - "."

  # ─────────────────────────────────────────────
  # STEP 4: Push Docker Image
  # ─────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "docker-push"
    args:
      - "push"
      - "--all-tags"
      - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ng-learn"

  # ─────────────────────────────────────────────
  # STEP 5: Deploy ke Cloud Run
  # ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "deploy"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "ng-learn"
      - "--image=asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ng-learn:$COMMIT_SHA"
      - "--region=asia-southeast2"
      - "--platform=managed"
      - "--allow-unauthenticated"

  # ─────────────────────────────────────────────
  # NOTIFIKASI: Build Berhasil ✅
  # ─────────────────────────────────────────────
  - name: "curlimages/curl"
    id: "notify-success"
    entrypoint: "sh"
    args:
      - "-c"
      - |
        AUTHOR=$$(cat /workspace/author.txt | tr -d '"\\' | tr '\n' ' ')
        COMMIT_MSG=$$(cat /workspace/message.txt | tr -d '"\\' | tr '\n' ' ')
        COMMIT_SHORT=$$(echo "$COMMIT_SHA" | cut -c1-7)
        curl -sS -X POST "${_DISCORD_WEBHOOK}" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"NG.LEARN CI/CD\",\"embeds\":[{\"title\":\"\u2705 Deploy Berhasil!\",\"description\":\"**NG.LEARN** berhasil di-deploy ke production!\",\"color\":65280,\"fields\":[{\"name\":\"\ud83d\udc64 Di-deploy oleh\",\"value\":\"$$AUTHOR\",\"inline\":true},{\"name\":\"\ud83c\udf3f Branch\",\"value\":\"$BRANCH_NAME\",\"inline\":true},{\"name\":\"\ud83d\udce6 Commit\",\"value\":\"$$COMMIT_SHORT\",\"inline\":true},{\"name\":\"\ud83d\udcdd Pesan Commit\",\"value\":\"$$COMMIT_MSG\",\"inline\":false},{\"name\":\"\ud83c\udf10 Aplikasi Live\",\"value\":\"https://ng-learn-952620701939.asia-southeast2.run.app\",\"inline\":false},{\"name\":\"\ud83d\udccb Build Log\",\"value\":\"https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID\",\"inline\":false}],\"footer\":{\"text\":\"Google Cloud Build\"}}]}"

  # ─────────────────────────────────────────────
  # NOTIFIKASI: Build Gagal ❌
  # waitFor semua step — hanya jalan jika ada yang gagal
  # ─────────────────────────────────────────────
  - name: "curlimages/curl"
    id: "notify-failure"
    entrypoint: "sh"
    waitFor: ["get-commit-info"]
    args:
      - "-c"
      - |
        AUTHOR=$$(cat /workspace/author.txt | tr -d '"\\' | tr '\n' ' ')
        COMMIT_MSG=$$(cat /workspace/message.txt | tr -d '"\\' | tr '\n' ' ')
        COMMIT_SHORT=$$(echo "$COMMIT_SHA" | cut -c1-7)
        curl -sS -X POST "${_DISCORD_WEBHOOK}" \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"NG.LEARN CI/CD\",\"embeds\":[{\"title\":\"\u274c Build Gagal!\",\"description\":\"Ada error saat build atau deploy. Segera cek log!\",\"color\":16711680,\"fields\":[{\"name\":\"\ud83d\udc64 Di-push oleh\",\"value\":\"$$AUTHOR\",\"inline\":true},{\"name\":\"\ud83c\udf3f Branch\",\"value\":\"$BRANCH_NAME\",\"inline\":true},{\"name\":\"\ud83d\udce6 Commit\",\"value\":\"$$COMMIT_SHORT\",\"inline\":true},{\"name\":\"\ud83d\udcdd Pesan Commit\",\"value\":\"$$COMMIT_MSG\",\"inline\":false},{\"name\":\"\ud83d\udd0d Cek Log\",\"value\":\"https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=$PROJECT_ID\",\"inline\":false}],\"footer\":{\"text\":\"Google Cloud Build\"}}]}"

images:
  - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ng-learn:$COMMIT_SHA"
  - "asia-southeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ng-learn:latest"

substitutions:
  # ⚠️ JANGAN isi nilai ini di sini!
  # Set via Cloud Build Trigger → Edit → Substitution Variables
  # Variable: _DISCORD_WEBHOOK | Value: https://discord.com/api/webhooks/...
  _DISCORD_WEBHOOK: ""

options:
  logging: CLOUD_LOGGING_ONLY
